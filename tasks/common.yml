---
# Steps that run on every node — server, client, or both.

- name: Ensure required packages are present
  ansible.builtin.apt:
    name:
      - unzip       # needed to extract the Nomad zip release
      - curl
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create nomad system group
  ansible.builtin.group:
    name: "{{ nomad_group }}"
    system: true

- name: Create nomad system user
  ansible.builtin.user:
    name: "{{ nomad_user }}"
    group: "{{ nomad_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ nomad_data_dir }}"
    create_home: false

- name: Ensure nomad data directory exists
  ansible.builtin.file:
    path: "{{ nomad_data_dir }}"
    state: directory
    owner: "{{ nomad_user }}"
    group: "{{ nomad_group }}"
    mode: "0700"

- name: Ensure nomad config directory exists
  ansible.builtin.file:
    path: "{{ nomad_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure nomad plugin directory exists
  ansible.builtin.file:
    path: "{{ nomad_plugin_dir }}"
    state: directory
    owner: "{{ nomad_user }}"
    group: "{{ nomad_group }}"
    mode: "0755"

- name: Check installed nomad version (if any)
  ansible.builtin.command: "{{ nomad_install_dir }}/nomad version"
  register: nomad_installed_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install nomad binary
  # Skip when the right version is already on the host. The
  # nomad-client distrobuilder template bakes the binary in, so
  # clients no-op here; servers (fresh VMs) install fresh.
  when: >-
    nomad_installed_version.rc != 0
    or nomad_version not in (nomad_installed_version.stdout | default(''))
  block:
    - name: Download nomad release zip
      ansible.builtin.get_url:
        url: "{{ nomad_download_url }}"
        dest: "/tmp/nomad-{{ nomad_version }}.zip"
        mode: "0644"

    - name: Extract nomad binary into place
      ansible.builtin.unarchive:
        src: "/tmp/nomad-{{ nomad_version }}.zip"
        dest: "{{ nomad_install_dir }}"
        remote_src: true
        creates: "{{ nomad_install_dir }}/nomad"
        mode: "0755"

    - name: Set nomad binary permissions
      ansible.builtin.file:
        path: "{{ nomad_install_dir }}/nomad"
        owner: root
        group: root
        mode: "0755"

    - name: Clean up downloaded zip
      ansible.builtin.file:
        path: "/tmp/nomad-{{ nomad_version }}.zip"
        state: absent

- name: Drop systemd unit
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart nomad
