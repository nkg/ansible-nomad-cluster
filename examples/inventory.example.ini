; Example Nomad inventory.
;
; Three servers (one per Proxmox host — small VMs, 2 vCPU / 2 GB).
; Two clients (LXCs with podman) host the actual workloads.
;
; Adjust hostnames + IPs to match your environment.

[nomad_servers]
nomad-server-pve-01 ansible_host=192.168.1.121
nomad-server-pve-02 ansible_host=192.168.1.122
nomad-server-pve-03 ansible_host=192.168.1.123

[nomad_clients]
nomad-client-pve-02 ansible_host=192.168.1.151
nomad-client-pve-03 ansible_host=192.168.1.152

[all:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
